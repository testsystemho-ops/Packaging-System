<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Makro Packaging Count | บันทึกการตรวจนับ Fresh Food</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
============================================================ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="mark"><img class="brand-logo" alt="Makro"></div>
      <div>
        <div class="title">Packaging Count</div>
        <div class="subtitle">ระบบบันทึกการตรวจนับ Packing &mdash; Fresh Food</div>
      </div>
    </div>

    <div class="login-error" id="loginError">ชื่อผู้ใช้ หรือ รหัสผ่าน ไม่ถูกต้อง</div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="loginUser">รหัสผู้ใช้งาน (Username)</label>
        <input type="text" id="loginUser" placeholder="กรอกรหัสผู้ใช้งาน" required>
      </div>
      <div class="field">
        <label for="loginPass">รหัสผ่าน (Password)</label>
        <input type="password" id="loginPass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="padding:13px;">เข้าสู่ระบบ</button>
    </form>

    <div class="login-foot">
      CP Axtra &mdash; Store Operations &middot; Fresh Food Packaging Count
    </div>
  </div>
</div>

<!-- ============================================================
     APP SHELL
============================================================ -->
<div id="app" class="hidden">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="mark"><img class="brand-logo" alt="Makro"></div>
      <div>
        <div class="name" id="sbStoreName">&nbsp;</div>
        <div class="role" id="sbRole">&nbsp;</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-foot">
      Packaging Count System<br>CP Axtra &middot; Fresh Food
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="flex items-center gap-12">
        <button class="btn btn-secondary btn-icon menu-toggle" id="menuToggle">&#9776;</button>
        <div>
          <div class="topbar-title" id="topbarTitle">&nbsp;</div>
          <div class="topbar-sub" id="topbarSub">&nbsp;</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" id="logoutBtn">ออกจากระบบ</button>
      </div>
    </div>

    <div class="content" id="content">
      <!-- Views are rendered here by app.js -->
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<!-- ============================================================
     SCRIPTS
     ลำดับการโหลดมีผล: firebase SDK -> firebase.js (config+data) -> app.js (logic)
============================================================ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
